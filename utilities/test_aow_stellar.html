<script>
  // RNG (copied verbatim from js/core.js)
  function hashString(str) {
    let h = 2166136261 >>> 0;
    for (let i = 0; i < str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 16777619);
    }
    return h >>> 0;
  }
  function mulberry32(a) {
    return function () {
      let t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  let masterSeed = 'AoWTest';
  let rng = mulberry32(hashString(masterSeed));

  function reseedForHex(hexId) {
    rng = mulberry32(hashString(masterSeed + '-' + (hexId || '0000')));
  }

  // Trace stubs — keep them silent
  window.isLoggingEnabled = false;
  function tSection()    {}
  function tResult()     {}
  function tSkip()       {}
  function writeLogLine(){}
  function startTrace()  {}
  function endTrace()    {}
</script>

<script>
// ============================================================
// MINI TEST RUNNER
// ============================================================

const testQueue  = [];  // {groupName, desc, fn}
let _curGroup = null;

function group(name) { _curGroup = name; }
function test(desc, fn) { testQueue.push({ group: _curGroup, desc, fn }); }

function assert(cond, msg, errors) {
  if (!cond) errors.push(msg || 'assertion failed');
}

// ============================================================
// HELPER: run the three stellar-engine phases for one hex
// ============================================================

function runStellar(hexId, options) {
  reseedForHex(hexId);
  const sys = { hexId, stars: [], hierarchy: null };
  AoWStellarEngine.generateStarHierarchyAndMasses(sys, options || { forceEarthlike: false });
  AoWStellarEngine.generateAgeMetallicityAndEvolution(sys, options || { forceEarthlike: false });
  AoWStellarEngine.generateStellarOrbits(sys);
  return sys;
}

// ============================================================
// ── GROUP 1: DATA TABLE FIDELITY ────────────────────────────
// These tests run directly against aow_data.js; no engine
// execution needed.  They catch copy-paste errors in the tables.
// ============================================================

group('DATA — Primary Star Category Table');

test('4 categories with spec roll ranges (1-3 BD, 4-77 LMS, 78-90 IMS, 91-100 HMS)', (e) => {
  const c = primaryStarCategoryTable.categories;
  assert(c.length === 4, `Row count: expected 4 got ${c.length}`, e);
  assert(c[0].minRoll===1   && c[0].maxRoll===3,   `BD: ${c[0].minRoll}-${c[0].maxRoll}`, e);
  assert(c[1].minRoll===4   && c[1].maxRoll===77,  `LMS: ${c[1].minRoll}-${c[1].maxRoll}`, e);
  assert(c[2].minRoll===78  && c[2].maxRoll===90,  `IMS: ${c[2].minRoll}-${c[2].maxRoll}`, e);
  assert(c[3].minRoll===91  && c[3].maxRoll===100, `HMS: ${c[3].minRoll}-${c[3].maxRoll}`, e);
});

test('Category name strings match spec', (e) => {
  const c = primaryStarCategoryTable.categories;
  assert(c[0].category === 'Brown Dwarf',            `c[0]: "${c[0].category}"`, e);
  assert(c[1].category === 'Low Mass Star',           `c[1]: "${c[1].category}"`, e);
  assert(c[2].category === 'Intermediate Mass Star',  `c[2]: "${c[2].category}"`, e);
  assert(c[3].category === 'High Mass Star',          `c[3]: "${c[3].category}"`, e);
});

group('DATA — Stellar Mass Tables');

test('Brown Dwarf: 7 rows, first 01-10→0.015, last 88-100→0.07', (e) => {
  const t = brownDwarfMassTable.results;
  assert(t.length === 7, `Expected 7 rows, got ${t.length}`, e);
  assert(t[0].minRoll===1   && t[0].maxRoll===10  && t[0].mass===0.015, `Row0: ${JSON.stringify(t[0])}`, e);
  assert(t[1].minRoll===11  && t[1].maxRoll===29  && t[1].mass===0.02,  `Row1: ${JSON.stringify(t[1])}`, e);
  assert(t[6].minRoll===88  && t[6].maxRoll===100 && t[6].mass===0.07,  `Row6: ${JSON.stringify(t[6])}`, e);
  t.forEach((r,i) => assert(r.mass >= 0.015 && r.mass <= 0.07, `Row${i} mass ${r.mass} outside BD range`, e));
});

test('Low Mass Star: 19 rows, first 01-13→0.08, last 100→0.68', (e) => {
  const t = lowMassStarTable.results;
  assert(t.length === 19, `Expected 19 rows, got ${t.length}`, e);
  assert(t[0].minRoll===1   && t[0].maxRoll===13  && t[0].mass===0.08, `Row0: ${JSON.stringify(t[0])}`, e);
  assert(t[18].minRoll===100 && t[18].maxRoll===100 && t[18].mass===0.68, `Row18: ${JSON.stringify(t[18])}`, e);
  // Spot-check Alice's example (spec p.31): roll 48 → 0.18 M☉
  const r18 = t.find(r => r.mass === 0.18);
  assert(r18 && r18.minRoll===44 && r18.maxRoll===52, `0.18 M☉ (spec 44-52): ${JSON.stringify(r18)}`, e);
});

test('Intermediate Mass Star: 25 rows, first 01-07→0.70, last 98-100→1.25', (e) => {
  const t = intermediateMassStarTable.results;
  assert(t.length === 25, `Expected 25 rows, got ${t.length}`, e);
  assert(t[0].minRoll===1   && t[0].maxRoll===7   && t[0].mass===0.70, `Row0: ${JSON.stringify(t[0])}`, e);
  assert(t[24].minRoll===98 && t[24].maxRoll===100 && t[24].mass===1.25, `Row24: ${JSON.stringify(t[24])}`, e);
  // Alice's example: roll 61 → 0.94 M☉ (spec: 60-62)
  const r94 = t.find(r => r.mass === 0.94);
  assert(r94 && r94.minRoll===60 && r94.maxRoll===62, `0.94 M☉ (spec 60-62): ${JSON.stringify(r94)}`, e);
  // Spec: 69-71 → 1.00
  const r100 = t.find(r => r.mass === 1.00);
  assert(r100 && r100.minRoll===69 && r100.maxRoll===71, `1.00 M☉ (spec 69-71): ${JSON.stringify(r100)}`, e);
});

test('High Mass Star: 29 rows, first 01-03→1.28, last 99-100→6.00', (e) => {
  const t = highMassStarTable.results;
  assert(t.length === 29, `Expected 29 rows, got ${t.length}`, e);
  assert(t[0].minRoll===1   && t[0].maxRoll===3   && t[0].mass===1.28, `Row0: ${JSON.stringify(t[0])}`, e);
  assert(t[28].minRoll===99 && t[28].maxRoll===100 && t[28].mass===6.00, `Row28: ${JSON.stringify(t[28])}`, e);
});

group('DATA — Multiplicity & Companion Tables');

test('Multiplicity Threshold: 5 rows, correct mass breaks and thresholds', (e) => {
  const t = multiplicityThresholdTable.results;
  assert(t.length === 5, `Expected 5 rows, got ${t.length}`, e);
  // Spec: <0.08→14, 0.08-0.70→13, 0.70-1.00→12, 1.00-1.30→11, ≥1.30→10
  assert(t[0].minMass===0.00 && t[0].maxMass===0.08  && t[0].threshold===14, `t[0]: ${JSON.stringify(t[0])}`, e);
  assert(t[1].minMass===0.08 && t[1].maxMass===0.70  && t[1].threshold===13, `t[1]: ${JSON.stringify(t[1])}`, e);
  assert(t[2].minMass===0.70 && t[2].maxMass===1.00  && t[2].threshold===12, `t[2]: ${JSON.stringify(t[2])}`, e);
  assert(t[3].minMass===1.00 && t[3].maxMass===1.30  && t[3].threshold===11, `t[3]: ${JSON.stringify(t[3])}`, e);
  assert(t[4].minMass===1.30 && t[4].threshold===10,                          `t[4]: ${JSON.stringify(t[4])}`, e);
});

test('Stellar Multiplicity: 01-75→2, 76-95→3, 96-100→4', (e) => {
  const t = stellarMultiplicityTable.results;
  assert(t.length === 3, `Expected 3 rows, got ${t.length}`, e);
  assert(t[0].minRoll===1  && t[0].maxRoll===75  && t[0].numberOfStars===2, `Row0: ${JSON.stringify(t[0])}`, e);
  assert(t[1].minRoll===76 && t[1].maxRoll===95  && t[1].numberOfStars===3, `Row1: ${JSON.stringify(t[1])}`, e);
  assert(t[2].minRoll===96 && t[2].maxRoll===100 && t[2].numberOfStars===4, `Row2: ${JSON.stringify(t[2])}`, e);

test('Companion Star Mass: 19 rows, 01-04→0.05, 87-100→0.95, key middle entries', (e) => {
  const t = companionStarMassTable.results;
  assert(t.length === 19, `Expected 19 rows, got ${t.length}`, e);
  assert(t[0].minRoll===1  && t[0].maxRoll===4   && t[0].massRatio===0.05, `Row0 (spec ≤04→0.05): ${JSON.stringify(t[0])}`, e);
  assert(t[1].minRoll===5  && t[1].maxRoll===8   && t[1].massRatio===0.10, `Row1 (spec 05-08→0.10): ${JSON.stringify(t[1])}`, e);
  assert(t[18].minRoll===87 && t[18].maxRoll===100 && t[18].massRatio===0.95, `Row18 (spec ≥87→0.95): ${JSON.stringify(t[18])}`, e);
  // Spec: 29-31 → 0.40
  const r40 = t.find(r => r.massRatio === 0.40);
  assert(r40 && r40.minRoll===29 && r40.maxRoll===31, `0.40 ratio (spec 29-31): ${JSON.stringify(r40)}`, e);
  // Spec: 77-86 → 0.90
  const r90 = t.find(r => r.massRatio === 0.90);
  assert(r90 && r90.minRoll===77 && r90.maxRoll===86, `0.90 ratio (spec 77-86): ${JSON.stringify(r90)}`, e);
});

group('DATA — Stellar Age Table');

test('5 population rows with correct base ages and ranges (spec p.38)', (e) => {
  const t = stellarAgeTable.results;
  assert(t.length === 5, `Expected 5 rows, got ${t.length}`, e);
  // Spec: 01-42 Young Pop I, base 0.0, range 2.0
  assert(t[0].minRoll===1   && t[0].maxRoll===42  && t[0].baseAge===0.0 && t[0].ageRange===2.0, `Young Pop I: ${JSON.stringify(t[0])}`, e);
  // Spec: 43-76 Intermediate Pop I, base 2.0, range 3.0
  assert(t[1].minRoll===43  && t[1].maxRoll===76  && t[1].baseAge===2.0 && t[1].ageRange===3.0, `Int Pop I: ${JSON.stringify(t[1])}`, e);
  // Spec: 77-95 Old Pop I, base 5.0, range 3.0
  assert(t[2].minRoll===77  && t[2].maxRoll===95  && t[2].baseAge===5.0 && t[2].ageRange===3.0, `Old Pop I: ${JSON.stringify(t[2])}`, e);
  // Spec: 96-99 Disk Pop II, base 8.0, range 1.5
  assert(t[3].minRoll===96  && t[3].maxRoll===99  && t[3].baseAge===8.0 && t[3].ageRange===1.5, `Disk Pop II: ${JSON.stringify(t[3])}`, e);
  // Spec: 00 (roll=100) Halo Pop II, base 9.5, range 3.0
  assert(t[4].minRoll===100 && t[4].maxRoll===100 && t[4].baseAge===9.5 && t[4].ageRange===3.0, `Halo Pop II: ${JSON.stringify(t[4])}`, e);
});

test('Age ranges are consistent: base + range ≤ 13.5 Gyr', (e) => {
  stellarAgeTable.results.forEach((r, i) => {
    assert(r.baseAge + r.ageRange <= 13.5, `Row${i} (${r.population}): base ${r.baseAge} + range ${r.ageRange} = ${r.baseAge+r.ageRange} > 13.5`, e);
  });
});

group('DATA — Red Dwarf & Main Sequence Tables');

test('Red Dwarf: 13 entries, spot-checked against spec', (e) => {
  const t = redDwarfStellarCharacteristicsTable.results;
  assert(t.length === 13, `Expected 13 rows, got ${t.length}`, e);
  const checks = [
    { mass: 0.08, temp: 2500,  lum: 0.00047 },
    { mass: 0.18, temp: 3210,  lum: 0.0044  },
    { mass: 0.50, temp: 3780,  lum: 0.039   },
  ];
  checks.forEach(c => {
    const row = t.find(r => r.mass === c.mass);
    assert(row, `No entry for mass ${c.mass}`, e);
    if (!row) return;
    assert(row.expectedEffectiveTemperature === c.temp,
      `Mass ${c.mass}: temp spec=${c.temp} got=${row.expectedEffectiveTemperature}`, e);
    assert(Math.abs(row.expectedLuminosity - c.lum) <= c.lum * 0.001,
      `Mass ${c.mass}: lum spec=${c.lum} got=${row.expectedLuminosity}`, e);
  });
});

test('Main Sequence: 55 entries, key rows match spec', (e) => {
  const t = mainSequenceStellarCharacteristicsTable.results;
  assert(t.length === 61, `Expected 61 rows, got ${t.length}`, e);

  function chk(mass, T0, Tf, L0, GR, S) {
    const r = t.find(x => x.mass === mass);
    assert(r, `No entry for ${mass} M☉`, e);
    if (!r) return;
    assert(r.initialEffectiveTemperature  === T0, `${mass}M☉ T0: spec=${T0} got=${r.initialEffectiveTemperature}`, e);
    assert(r.finalEffectiveTemperature    === Tf, `${mass}M☉ Tf: spec=${Tf} got=${r.finalEffectiveTemperature}`, e);
    assert(r.initialLuminosity            === L0, `${mass}M☉ L0: spec=${L0} got=${r.initialLuminosity}`, e);
    assert(r.luminosityGrowthRate         === GR, `${mass}M☉ GR: spec=${GR} got=${r.luminosityGrowthRate}`, e);
    assert(r.mainSequenceLifespanGyr      === S,  `${mass}M☉ S: spec=${S} got=${r.mainSequenceLifespanGyr}`, e);
  }

  // Mass 0.50 M☉ — first table row
  chk(0.50, 3780, 4330, 0.039, 1.010, 131);
  // Mass 1.00 M☉ — Sun analog
  chk(1.00, 5600, 5670, 0.71, 1.076, 10.5);
  // Mass 0.94 M☉ — Alice's Arcadia example from spec
  chk(0.94, 5390, 5590, 0.53, 1.064, 13.5);
  // Mass 6.00 M☉ — last row
  chk(6.00, 18800, 15300, 1000.0, 185800.0, 0.0647);
});

group('DATA — Spectral Type Table');

test('Key temperature→type mappings match spec (p.50)', (e) => {
  const t = spectralTypeTable.results;
  const checks = [
    { temp: 5770, type: 'G2' },   // Our Sun
    { temp: 5450, type: 'G7' },   // Alice's Arcadia (spec example)
    { temp: 3220, type: 'M4' },   // Beta Nine A (spec example)
    { temp: 1660, type: 'L6' },   // Beta Nine B (spec example)
    { temp: 9200, type: 'A2' },
    { temp: 500,  type: 'Y0' },   // Coolest entry
    { temp: 17000, type: 'B3' },  // Hottest listed
  ];
  checks.forEach(c => {
    const row = t.find(r => r.temperature === c.temp);
    assert(row, `No entry for temp ${c.temp} K`, e);
    if (row) assert(row.type === c.type, `Temp ${c.temp}: spec="${c.type}" got="${row.type}"`, e);
  });
});

group('DATA — Stellar Orbit Tables');

test('Separation: 6 categories, base distances and roll ranges match spec (p.51)', (e) => {
  const t = stellarSeparationTable.results;
  assert(t.length === 6, `Expected 6 rows, got ${t.length}`, e);
  assert(t[0].separation==='Extremely Close' && t[0].baseDistanceAU===0.015,   `Row0: ${JSON.stringify(t[0])}`, e);
  assert(t[1].minRoll===4  && t[1].maxRoll===5  && t[1].separation==='Very Close' && t[1].baseDistanceAU===0.15,   `Row1: ${JSON.stringify(t[1])}`, e);
  assert(t[2].minRoll===6  && t[2].maxRoll===8  && t[2].separation==='Close'      && t[2].baseDistanceAU===1.5,    `Row2: ${JSON.stringify(t[2])}`, e);
  assert(t[3].minRoll===9  && t[3].maxRoll===12 && t[3].separation==='Moderate'   && t[3].baseDistanceAU===15.0,   `Row3: ${JSON.stringify(t[3])}`, e);
  assert(t[4].minRoll===13 && t[4].maxRoll===15 && t[4].separation==='Wide'       && t[4].baseDistanceAU===150.0,  `Row4: ${JSON.stringify(t[4])}`, e);
  assert(t[5].separation==='Very Wide' && t[5].baseDistanceAU===1500.0,            `Row5: ${JSON.stringify(t[5])}`, e);
});

test('Eccentricity: 10 rows, all values 0.0–0.9, roll ranges match spec (p.51)', (e) => {
  const t = stellarOrbitalEccentricityTable.results;
  assert(t.length === 10, `Expected 10 rows, got ${t.length}`, e);
  // Spec: ≤3→0.0, 4→0.1, 5-6→0.2, 7-8→0.3, 9-11→0.4
  //       12-13→0.5, 14-15→0.6, 16→0.7, 17→0.8, ≥18→0.9
  const expected = [
    [0.0, null, 3], [0.1, 4, 4], [0.2, 5, 6], [0.3, 7, 8],
    [0.4, 9, 11], [0.5, 12, 13], [0.6, 14, 15], [0.7, 16, 16],
    [0.8, 17, 17], [0.9, 18, null]
  ];
  expected.forEach(([ecc, minR, maxR], i) => {
    assert(t[i].eccentricity === ecc, `Row${i}: ecc spec=${ecc} got=${t[i].eccentricity}`, e);
    if (minR !== null) assert(t[i].minRoll === minR, `Row${i}: minRoll spec=${minR} got=${t[i].minRoll}`, e);
    if (maxR !== null) assert(t[i].maxRoll === maxR, `Row${i}: maxRoll spec=${maxR} got=${t[i].maxRoll}`, e);
  });
});

// ============================================================
// ── GROUP 2: ENGINE CONSTRAINT TESTS ────────────────────────
// Run N iterations; every generated system must satisfy the
// hard constraints from the spec.
// ============================================================

const N_DEFAULT = 1000;
let N = N_DEFAULT;

group('CONSTRAINTS — Steps 1–3: Hierarchy & Masses');

test('Primary star mass always ≥ 0.015 M☉', (e) => {
  for (let i = 0; i < N; i++) {
    const sys = runStellar(`c1-${i}`);
    sys.stars.forEach(s => assert(s.initialMass >= 0.015,
      `Hex c1-${i} Star ${s.label}: mass=${s.initialMass} < 0.015`, e));
  }
});

test('sys.hierarchy is one of 5 valid strings', (e) => {
  const VALID = new Set(['Singleton','Binary','Trinary (A-B, C)','Trinary (A, B-C)','Quaternary (A-B, C-D)']);
  for (let i = 0; i < N; i++) {
    const sys = runStellar(`c2-${i}`);
    assert(VALID.has(sys.hierarchy), `Hex c2-${i}: hierarchy="${sys.hierarchy}"`, e);
  }
});

test('Star count matches hierarchy type', (e) => {
  const map = { 'Singleton':1, 'Binary':2, 'Trinary (A-B, C)':3, 'Trinary (A, B-C)':3, 'Quaternary (A-B, C-D)':4 };
  for (let i = 0; i < N; i++) {
    const sys = runStellar(`c3-${i}`);
    assert(sys.stars.length === map[sys.hierarchy],
      `Hex c3-${i}: ${sys.hierarchy} expects ${map[sys.hierarchy]} stars, got ${sys.stars.length}`, e);
  }
});

test('Star labels are A, B, C, D in sequence', (e) => {
  const seq = ['A','B','C','D'];
  for (let i = 0; i < N; i++) {
    const sys = runStellar(`c4-${i}`);
    sys.stars.forEach((s, idx) => assert(s.label === seq[idx],
      `Hex c4-${i}: stars[${idx}].label="${s.label}", expected "${seq[idx]}"`, e));
  }
});

test('Companion masses ≤ primary mass (spec: companions rated relative to primary)', (e) => {
  for (let i = 0; i < N; i++) {
    const sys = runStellar(`c5-${i}`);
    if (sys.stars.length > 1) {
      assert(sys.stars[1].initialMass <= sys.stars[0].initialMass,
        `Hex c5-${i}: B (${sys.stars[1].initialMass}) > A (${sys.stars[0].initialMass})`, e);
    }
  }
});

test('forceEarthlike: primary mass always in IMS range (0.70–1.25 M☉)', (e) => {
  for (let i = 0; i < 200; i++) {
    const sys = runStellar(`fe-${i}`, { forceEarthlike: true });
    const m = sys.stars[0].initialMass;
    assert(m >= 0.70 && m <= 1.25,
      `Hex fe-${i}: primary mass ${m} outside IMS range`, e);
  }
});

group('CONSTRAINTS — Step 4: System Age');

test('System age in [0.0, 13.5] Gyr', (e) => {
  for (let i = 0; i < N; i++) {
    const sys = runStellar(`a1-${i}`);
    assert(sys.systemAge >= 0 && sys.systemAge <= 13.5,
      `Hex a1-${i}: age=${sys.systemAge}`, e);
  }
});

test('Population II systems have age ≥ 8.0 Gyr', (e) => {
  for (let i = 0; i < N; i++) {
    const sys = runStellar(`a2-${i}`);
    if ((sys.population || '').includes('Population II'))
      assert(sys.systemAge >= 8.0, `Hex a2-${i}: ${sys.population} but age=${sys.systemAge}`, e);
  }

test('Main sequence (≥0.50 M☉): temperature within ±5% of T=T0+(Tf-T0)×(A/S)', (e) => {
  const tbl = mainSequenceStellarCharacteristicsTable.results;
  function interpolate(mass) {
    if (mass <= tbl[0].mass) return Object.assign({}, tbl[0]);
    if (mass >= tbl[tbl.length-1].mass) return Object.assign({}, tbl[tbl.length-1]);
    for (let j = 0; j < tbl.length-1; j++) {
      if (mass >= tbl[j].mass && mass <= tbl[j+1].mass) {
        const t2 = (mass - tbl[j].mass) / (tbl[j+1].mass - tbl[j].mass);
        return {
          initialEffectiveTemperature: tbl[j].initialEffectiveTemperature + t2*(tbl[j+1].initialEffectiveTemperature - tbl[j].initialEffectiveTemperature),
          finalEffectiveTemperature:   tbl[j].finalEffectiveTemperature   + t2*(tbl[j+1].finalEffectiveTemperature   - tbl[j].finalEffectiveTemperature),
          mainSequenceLifespanGyr:     tbl[j].mainSequenceLifespanGyr     + t2*(tbl[j+1].mainSequenceLifespanGyr     - tbl[j].mainSequenceLifespanGyr),
        };
      }
    }
    return Object.assign({}, tbl[tbl.length-1]);
  }
  for (let i = 0; i < N; i++) {
    const sys = runStellar(`e7-${i}`);
    sys.stars.filter(s => s.state === 'Main Sequence' && s.initialMass >= 0.50).forEach(s => {
      const row  = interpolate(s.initialMass);
      const rawT = row.initialEffectiveTemperature + (row.finalEffectiveTemperature - row.initialEffectiveTemperature) * (sys.systemAge / row.mainSequenceLifespanGyr);
      assert(s.effectiveTemperature >= rawT * 0.95 - 1 && s.effectiveTemperature <= rawT * 1.05 + 1,
        `Hex e7-${i} Star ${s.label} M=${s.initialMass}: T=${s.effectiveTemperature} outside ±5% of ${rawT.toFixed(0)}`, e);
    });
  }
});

// ============================================================
// STATISTICS — Evolved Star Frequency
// Catches silent zero-rate bugs; trivially-passing filter tests
// (filter().forEach on empty array) don't catch these.
// Uses 5000 iterations regardless of N to get reliable statistics.
// ============================================================

group('STATISTICS — Evolved Star Frequency');

test('Evolved stars appear in 5000 systems at expected rate (~0.5% per system)', (e) => {
  const counts = { Subgiant: 0, 'Red Giant Branch': 0, 'Horizontal Branch': 0 };
  const STAT_N = 5000;
  for (let i = 0; i < STAT_N; i++) {
    const sys = runStellar(`stat-${i}`);
    sys.stars.forEach(s => {
      if (counts[s.state] !== undefined) counts[s.state]++;
    });
  }
  const total = counts.Subgiant + counts['Red Giant Branch'] + counts['Horizontal Branch'];
  const pct   = (total / STAT_N * 100).toFixed(2);
  const ivCt  = counts.Subgiant;
  const iiiCt = counts['Red Giant Branch'] + counts['Horizontal Branch'];

  // Always-visible breakdown (blue info lines)
  e.push(`[INFO] Class IV  (Subgiant):          ${ivCt}`);
  e.push(`[INFO] Class III (Red Giant Branch):   ${counts['Red Giant Branch']}`);
  e.push(`[INFO] Class III (Horizontal Branch):  ${counts['Horizontal Branch']}`);
  e.push(`[INFO] Total evolved: ${total} / ${STAT_N} systems = ${pct}%  (expected ~0.5%)`);

  // Real pass/fail assertions
  assert(total > 0,
    `ZERO evolved stars in ${STAT_N} systems — generation bug. Expected ~0.5% per system.`, e);
  if (total > 0) {
    assert(total / STAT_N >= 0.0005,
      `Rate ${pct}% is suspiciously low (expected ~0.5%)`, e);
    assert(total / STAT_N <= 0.05,
      `Rate ${pct}% is suspiciously high (expected ~0.5%)`, e);
  }
});

// ============================================================
// TEST RUNNER & RENDERER
// ============================================================

function runAllTests(iterations) {
  N = iterations || N_DEFAULT;
  const groups = [];
  let cur = null;
  testQueue.forEach(({ group: gname, desc, fn }) => {
    if (!cur || cur.name !== gname) { cur = { name: gname, tests: [] }; groups.push(cur); }
    const errors = [];
    try { fn(errors); } catch (ex) { errors.push('THREW: ' + ex.message + '\n' + (ex.stack||'').split('\n')[1]); }
    const realErrors = errors.filter(err => !err.startsWith('[INFO]'));
    cur.tests.push({ desc, pass: realErrors.length === 0, errors });
  });
  return groups;
}

function renderResults(groups, verbose) {
  let passTotal = 0, failTotal = 0;
  const html = groups.map(g => {
    const gPass = g.tests.filter(t => t.pass).length;
    const gFail = g.tests.length - gPass;
    passTotal += gPass; failTotal += gFail;
    const cls  = gFail > 0 ? 'has-fail' : 'all-pass';
    const icon = gFail > 0 ? '✗' : '✓';
    const rows = g.tests.map(t => {
      const tick = t.pass
        ? '<span class="pass-icon">✓</span>'
        : '<span class="fail-icon">✗</span>';
      let out = `<div class="test-line">${tick} ${t.desc}</div>`;
      const realErrs = t.errors.filter(err => !err.startsWith('[INFO]'));
      const infoLines = t.errors.filter(err => err.startsWith('[INFO]'));
      if (!t.pass || (verbose && realErrs.length)) {
        realErrs.slice(0, 5).forEach(err =>
          out += `<div class="err-detail">↳ ${err}</div>`);
        if (realErrs.length > 5)
          out += `<div class="skip-line">  … and ${realErrs.length-5} more</div>`;
      }
      infoLines.forEach(info =>
        out += `<div class="info-detail">· ${info.slice(7)}</div>`);
      return out;
    }).join('');
    return `<div class="group ${cls}">
      <div class="group-header">
        <span class="gname">${icon} ${g.name}</span>
        &nbsp;
        <span class="pass-ct">${gPass} pass</span>
        ${gFail ? `<span class="fail-ct"> / ${gFail} fail</span>` : ''}
      </div>
      ${rows}
    </div>`;
  }).join('');

  const allOk = failTotal === 0;
  document.getElementById('summary').innerHTML = `
    <div class="summary ${allOk ? 'pass' : 'fail'}">
      <strong>${allOk ? '✓ ALL PASS' : '✗ FAILURES FOUND'}</strong>
      &nbsp;&mdash;&nbsp;
      ${passTotal} passed &nbsp;/&nbsp; ${failTotal} failed &nbsp;/&nbsp; ${passTotal+failTotal} total tests
      &nbsp;&nbsp;(${N} iterations per constraint suite)
    </div>`;
  document.getElementById('results').innerHTML = html;
}

function runTests(verbose, iterations) {
  const t0     = performance.now();
  const groups = runAllTests(iterations);
  const ms     = (performance.now() - t0).toFixed(0);
  renderResults(groups, verbose || false);
  document.getElementById('timing').textContent = `Completed in ${ms} ms`;
}

window.addEventListener('load', () => runTests(false));
</script>
